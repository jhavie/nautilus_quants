name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - prod

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/ --ignore=tests/unit/data --ignore=tests/unit/alpha --ignore=tests/unit/backtest --ignore=tests/integration/data --ignore=tests/integration/backtest -m "not network and not slow" -x -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set environment variables
        id: env
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "container=nautilus-prod" >> $GITHUB_OUTPUT
            echo "config=config/live/okx_fmz.yaml" >> $GITHUB_OUTPUT
            echo "env_file=/root/workspace/nautilus_quants/.env.prod" >> $GITHUB_OUTPUT
          else
            echo "container=nautilus-testnet-15m" >> $GITHUB_OUTPUT
            echo "config=config/live/okx_testnet_15m.yaml" >> $GITHUB_OUTPUT
            echo "env_file=/root/workspace/nautilus_quants/.env" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker login ghcr.io -u jhavie -p ${{ secrets.GHCR_PAT }}
            docker pull ${{ env.IMAGE }}:latest
            docker rm -f ${{ steps.env.outputs.container }} || true
            docker run -d \
              --name ${{ steps.env.outputs.container }} \
              --restart unless-stopped \
              --env-file ${{ steps.env.outputs.env_file }} \
              -e OPENBLAS_NUM_THREADS=1 \
              -e OMP_NUM_THREADS=1 \
              -v /root/workspace/nautilus_quants/config:/app/config:ro \
              -v /root/workspace/nautilus_quants/logs:/app/logs \
              -v /root/workspace/nautilus_quants/data:/app/data \
              ${{ env.IMAGE }}:latest \
              run ${{ steps.env.outputs.config }}
            sleep 5
            docker logs ${{ steps.env.outputs.container }} --tail 20

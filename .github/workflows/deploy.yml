name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - pre-release
          - prod
          - nightly
      image_tag:
        description: 'Optional image tag to build and deploy (e.g. 0.2.3-rc.1)'
        required: false
        type: string

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/ --ignore=tests/unit/data --ignore=tests/unit/alpha --ignore=tests/unit/backtest --ignore=tests/integration/data --ignore=tests/integration/backtest -m "not network and not slow" -x -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version tag: ${TAG:-none}"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            TAGS="${{ env.IMAGE }}:develop-latest,${{ env.IMAGE }}:develop-${{ github.sha }}"
          else
            TAGS="${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}"
            if [ -n "${{ steps.version.outputs.tag }}" ]; then
              TAGS="${TAGS},${{ env.IMAGE }}:${{ steps.version.outputs.tag }}"
            fi
          fi
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAGS="${TAGS},${{ env.IMAGE }}:${{ inputs.image_tag }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      - name: Select Dockerfile
        id: dockerfile
        run: |
          if [ "${{ inputs.environment }}" = "nightly" ]; then
            echo "file=Dockerfile.nightly" >> $GITHUB_OUTPUT
          else
            echo "file=Dockerfile" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.file }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Set environment variables
        id: env
        run: |
          CUSTOM_IMAGE_TAG="${{ inputs.image_tag }}"
          if [ "${{ github.ref_name }}" = "develop" ]; then
            IMAGE_TAG="develop-${{ github.sha }}"
          else
            IMAGE_TAG="${{ github.sha }}"
          fi

          case "${{ inputs.environment }}" in
            prod)
              if [ "${{ github.ref_name }}" != "main" ]; then
                echo "ERROR: prod deploy is only allowed from main (current=${{ github.ref_name }})"
                exit 1
              fi
              echo "container=nautilus-prod" >> $GITHUB_OUTPUT
              echo "config=config/live/okx_fmz.yaml" >> $GITHUB_OUTPUT
              echo "env_file=/home/ubuntu/workspace/nautilus_quants/.env.prod" >> $GITHUB_OUTPUT
              echo "github_environment=prod" >> $GITHUB_OUTPUT
              ;;
            pre-release)
              echo "container=nautilus-pre-release" >> $GITHUB_OUTPUT
              echo "config=config/live/okx_fmz_demo.yaml" >> $GITHUB_OUTPUT
              echo "env_file=/home/ubuntu/workspace/nautilus_quants/.env.pre" >> $GITHUB_OUTPUT
              echo "github_environment=pre-release" >> $GITHUB_OUTPUT
              ;;
            nightly)
              echo "container=nautilus-nightly" >> $GITHUB_OUTPUT
              echo "config=config/live/okx_testnet_nightly.yaml" >> $GITHUB_OUTPUT
              echo "env_file=/home/ubuntu/workspace/nautilus_quants/.env" >> $GITHUB_OUTPUT
              echo "github_environment=nightly" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "container=nautilus-testnet-15m" >> $GITHUB_OUTPUT
              echo "config=config/live/okx_testnet_15m.yaml" >> $GITHUB_OUTPUT
              echo "env_file=/home/ubuntu/workspace/nautilus_quants/.env" >> $GITHUB_OUTPUT
              echo "github_environment=testnet" >> $GITHUB_OUTPUT
              ;;
          esac

          if [ -n "${CUSTOM_IMAGE_TAG}" ]; then
            IMAGE_TAG="${CUSTOM_IMAGE_TAG}"
          fi
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker login ghcr.io -u jhavie -p ${{ secrets.GHCR_PAT }}
            docker pull ${{ env.IMAGE }}:${{ steps.env.outputs.image_tag }}
            docker rm -f ${{ steps.env.outputs.container }} || true
            docker run -d \
              --name ${{ steps.env.outputs.container }} \
              --restart unless-stopped \
              --env-file ${{ steps.env.outputs.env_file }} \
              -e OPENBLAS_NUM_THREADS=1 \
              -e OMP_NUM_THREADS=1 \
              -v /home/ubuntu/workspace/nautilus_quants/config:/app/config:ro \
              -v /home/ubuntu/workspace/nautilus_quants/logs:/app/logs \
              -v /home/ubuntu/workspace/nautilus_quants/data:/app/data \
              ${{ env.IMAGE }}:${{ steps.env.outputs.image_tag }} \
              run ${{ steps.env.outputs.config }}
            sleep 5
            docker logs ${{ steps.env.outputs.container }} --tail 20

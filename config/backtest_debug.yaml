# Debug Backtest Configuration - 小规模测试
# 15天数据，3个币种，DEBUG日志级别

venues:
  - name: "BINANCE"
    oms_type: "NETTING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "10000 USDT"
    default_leverage: 1

data:
  # 只用3个币种，15天数据
  - catalog_path: "/Users/joe/Sync/nautilus_quants2/data/marketcap/catalog/1h"
    data_cls: "nautilus_trader.model.data:Bar"
    instrument_ids:
      - "BTCUSDT.BINANCE"
      - "ETHUSDT.BINANCE"
      - "BNBUSDT.BINANCE"
    start_time: "2022-01-01"
    end_time: "2022-01-16"

engine:
  trader_id: "BACKTESTER-DEBUG"
  logging:
    log_level: "DEBUG"
  
  actors:
    - actor_path: "nautilus_quants.factors.engine.actor:FactorEngineActor"
      config_path: "nautilus_quants.factors.engine.actor:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cross_sectional_factors.yaml"
        interval: "1h"
        signal_prefix: "factor"
        max_history: 200
        publish_signals: true
  
  strategies:
    - strategy_path: "nautilus_quants.strategies.cross_sectional.strategy:CrossSectionalFactorStrategy"
      config_path: "nautilus_quants.strategies.cross_sectional.strategy:CrossSectionalFactorStrategyConfig"
      config:
        instrument_ids:
          - "BTCUSDT.BINANCE"
          - "ETHUSDT.BINANCE"
          - "BNBUSDT.BINANCE"
        n_positions: 1
        position_value: 1200.0
        rebalance_period: 4
        enable_long: true
        enable_short: true
        # 缓冲区阈值 (0.5 = 中位数)
        buffer_ratio: 0.5
        factor_weights:
          volume: 0.6
          momentum: 0.4
          volatility: 0.3
          corr: 0.4

report:
  output_dir: "/Users/joe/Sync/worktrees/nautilus_quants-feature-005/logs/backtest_runs"
  formats:
    - csv

# Extra Data Sources — CS Analysis Environment
# Referenced by alpha.yaml / backtest.yaml via extra_data_path
#
# Source types:
#   catalog   — load from NautilusTrader ParquetDataCatalog
#   parquet   — load from external parquet directory
#   bar       — extract from Bar objects (e.g. BinanceBar quote_volume)
#   broadcast — broadcast one instrument's close to all instruments

funding_rate:
  source: catalog
  path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  instruments: []       # empty = all universe instruments

open_interest:
  source: parquet
  path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  timeframe: "4h"
  instruments: []

quote_volume:
  source: bar
  path: "/Users/joe/Sync/nautilus_quants2/data/data_4years_4h/catalog"
  timeframe: "4h"

btc_close:
  source: broadcast
  instruments: ["BTC"]  # prefix match against panel columns

eth_close:
  source: broadcast
  instruments: ["ETH"]

# ── SanAPI: cross-exchange aggregated derivatives data ──
# Downloaded via: python -m nautilus_quants.data santiment-download
# Transformed via: python -m nautilus_quants.data santiment-transform

san_funding_rate:
  source: parquet
  path: "/Users/joe/Sync/nautilus_quants/data/catalog_sanapi"
  field_name: "san_funding_rate"
  file_suffix: "san_fr"
  timeframe: "4h"
  fill: ffill

san_open_interest:
  source: parquet
  path: "/Users/joe/Sync/nautilus_quants/data/catalog_sanapi"
  field_name: "san_open_interest"
  file_suffix: "san_oi"
  timeframe: "4h"
  fill: ffill

# ROLLING 24h USD trading volume aggregated across exchanges, sampled every 4h.
# NOT a 4h bucket; use cs_rank for attention ranking, not absolute volume.
san_volume_usd:
  source: parquet
  path: "/Users/joe/Sync/nautilus_quants/data/catalog_sanapi"
  field_name: "san_volume_usd"
  file_suffix: "san_vol"
  timeframe: "4h"
  fill: ffill

# Total social mentions across Twitter/Reddit/Telegram/4chan/Farcaster (count).
# Proprietary signal — unique to SanAPI. Use rate-of-change rather than raw counts.
san_social_volume:
  source: parquet
  path: "/Users/joe/Sync/nautilus_quants/data/catalog_sanapi"
  field_name: "san_social_volume"
  file_suffix: "san_social"
  timeframe: "4h"
  fill: ffill

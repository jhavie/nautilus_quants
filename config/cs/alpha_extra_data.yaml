# Alpha Factor Analysis — Extra Data Sources E2E Test
# Tests all 5 extra data sources with factors_extra_data.yaml
#
# Usage:
#   python -m nautilus_quants.alpha analyze config/cs/alpha_extra_data.yaml

registry:

output_dir: "logs/regime_llm_claude"

# Regime analysis
regime:
  regime_instrument: "BTCUSDT.BINANCE"
  jump_model:
    n_states: 2
    jump_penalty: 5000.0
    feature_set: "full"
    refit_window: 0        # 0=expanding window, >0=rolling window bars
    refit_interval: 504    # refit every 504 bars (~84 days at 4h)
    min_train: 1008        # minimum 1008 bars (~168 days) before first fit
  ema:
    span: 200
  forward_period: 1
  min_obs: 20
  min_weight: 0.02
  export_weights: true

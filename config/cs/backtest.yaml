# CS Strategy Backtest Configuration
# FMZ 逻辑 via DecisionEngineActor (NETTING mode, one-shot flip)
#
# 125 Symbols
# 时间范围: 2022-01-01 ~ 2022-03-31
# 初始资金: 10000 USDT
# 持仓数量: 多空各40个
# 单品种仓位: 300 USDT
# 调仓周期: 每根 bar (4h)
# 因子: alpha044 (correlation(high, rank(volume), 5))


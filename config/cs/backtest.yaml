engine:
  trader_id: "BACKTESTER-CS-001"
  logging:
    log_level: "INFO"
  risk_engine:
    bypass: true

  controller:
    controller_path: "nautilus_quants.controllers.equity_guard:EquityGuardController"
    config_path: "nautilus_quants.controllers.equity_guard:EquityGuardControllerConfig"
    config:
      interval: "1h"
      venue_name: "BINANCE"
      currency: "USDT"
      drawdown_window: "30d"
      drawdown_ratio: 0.95
      min_equity_ratio: 0.3
      cooldown_period: "72h"
      guarded_strategy_ids: []

  actors:
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cs/factors.yaml"
        interval: "4h"
        signal_prefix: "factor"
        max_history: 0
        publish_signals: true

    - actor_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActor"
      config_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActorConfig"
      config:
        interval: "4h"
        venue_name: "BINANCE"
        currency: "USDT"

    - actor_path: "nautilus_quants.strategies.cs.decision_engine:DecisionEngineActor"
      config_path: "nautilus_quants.strategies.cs.config:DecisionEngineActorConfig"
      config:
        selection_policy: "FMZSelectionPolicy"
        n_long: 40
        n_short: 40
        position_value: 300
        composite_factor: "alpha044"
        rebalance_interval: 1
        # --- TopK Dropout mode (uncomment to switch) ---
        # selection_policy: "TopKDropoutSelectionPolicy"
        # topk_long: 20
        # topk_short: 20
        # n_drop_long: 5
        # n_drop_short: 5

  strategies:
    - strategy_path: "nautilus_quants.strategies.cs.strategy:CSStrategy"
      config_path: "nautilus_quants.strategies.cs.config:CSStrategyConfig"
      config:
        instrument_ids: *instrument_ids
        execution_policy: "MarketExecutionPolicy"

report:
  output_dir: "logs/performance"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "CS Strategy Backtest (2022-01 to 2022-03)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "CS Strategy QuantStats Analysis"
    output_format:
      - html
      - png
  position_viz:
    enabled: true
    title: "CS Strategy Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "4h"
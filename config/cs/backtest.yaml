    title: "CS Strategy Backtest (2022-01 to 2022-03)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "CS Strategy QuantStats Analysis"
    output_format:
      - html
      - png
  position_viz:
    enabled: true
    title: "CS Strategy Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "4h"
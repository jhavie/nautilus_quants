# Auto-generated by alpha export-factors
# method: equal, top: 10, transform: cs_rank
# generated: 2026-04-06T00:39:02

metadata:
  name: registry_export
  source: llm_claude
  version: 1.0.0
  description: Auto-generated from registry (10 active factors, method=equal, transform=cs_rank)
variables:
  returns: delta(close, 1) / replace_zero(delay(close, 1))
factors:
  volume_confirmation_momentum:
    expression: cs_rank(correlation(returns, delta(log(volume), 1), 20))
    description: 20-bar rolling Pearson correlation between bar returns and 1-period
      log-volume change. High correlation indicates volume-confirmed moves; cross-sectional
      rank normalizes across the universe.
    tags:
    - momentum
    - volume
    - correlation
  informed_flow_momentum:
    expression: cs_rank(correlation(returns, log(volume), 42))
    description: Pearson correlation between bar returns and log-volume over a 42-bar
      (~1 week) rolling window. High positive values indicate that large up-moves
      were consistently accompanied by high volume (informed flow signature); near-zero
      or negative values indicate decoupling of price and volume.
    tags:
    - momentum
    - volume
    - correlation
    - informed_flow
  sharpe_ratio_momentum:
    expression: cs_rank(ts_mean(returns, 18) / replace_zero(ts_std(returns, 36)))
    description: 18期平均回报除以36期回报标准差，构造类夏普比率后截面排名。捕捉持续且低波动的动量信号。
    tags:
    - momentum
    - volatility
    - risk-adjusted
  vol_of_vol:
    expression: cs_rank(-ts_std(ts_std(returns, 6), 18))
    description: 波动率的波动率：先计算 6-bar 滚动标准差，再对其求 18-bar 滚动标准差，取负；惩罚波动率状态频繁切换的品种
    tags:
    - volatility
    - risk
    - regime
    prototype: vol_of_vol
  combined_momentum_volume_rank:
    expression: cs_rank(cs_rank(ts_mean(returns, 12)) * cs_rank(ts_mean(log(replace_zero(volume)),
      12)))
    description: 'Outer cross-sectional rank of the product of two inner cross-sectional
      ranks: (1) 12-bar mean-return rank and (2) 12-bar mean log-volume rank. High
      when an instrument ranks high on both dimensions simultaneously.'
    tags:
    - momentum
    - volume
    - composite
    - cross_sectional
  upside_downside_ratio:
    expression: cs_rank(-(ts_max(returns, 24) / replace_zero(abs(ts_min(returns, 24)))))
    description: Negative ratio of 24-bar peak return to magnitude of 24-bar trough
      return. High factor = symmetric gain-loss profile = less speculative asymmetry,
      lower mean reversion risk.
    tags:
    - reversal
    - distribution
    - tail_ratio
    - asymmetry
  vol_confirmed_momentum:
    expression: cs_rank(ts_mean(returns * ts_rank(volume, 20), 6))
    description: 6-bar mean of returns scaled by each bar's volume percentile rank
      in a 20-bar window. High values require both positive returns AND above-average
      volume — weak-volume moves are discounted.
    tags:
    - momentum
    - volume
    prototype: vol
  price_volume_confirmation:
    expression: cs_rank(correlation(ts_rank(high, 24), ts_rank(volume, 24), 12))
    description: 12 bar 滚动计算 24 bar 窗口内价格高点排名与成交量排名的 Pearson 相关性；正值代表量价齐升，负值代表量价背离。
    tags:
    - volume
    - divergence
    - confirmation
    - correlation
  return_rank_persistence:
    expression: cs_rank(-ts_mean(ts_rank(returns, 42), 14))
    description: 14-bar moving average of the 42-bar time-series return rank. Captures
      persistent relative outperformance within each instrument's own history; negated
      for mean-reversion signal.
    tags:
    - reversal
    - momentum
    - rank
  alpha158_MIN60:
    expression: ts_min(low, 60) / close
    description: Rolling min of low / current close (window=60)
    tags:
    - volatility
    prototype: MIN
composite:
  name: composite
  transform: normalize
  weights:
    volume_confirmation_momentum: -0.1
    informed_flow_momentum: -0.1
    sharpe_ratio_momentum: -0.1
    vol_of_vol: 0.1
    combined_momentum_volume_rank: -0.1
    upside_downside_ratio: 0.1
    vol_confirmed_momentum: -0.1
    price_volume_confirmation: -0.1
    return_rank_persistence: 0.1
    alpha158_MIN60: 0.1

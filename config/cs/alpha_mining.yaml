# Alpha Factor Mining Configuration
# LLM-driven factor discovery via Claude Code CLI
#
# Usage:
#   python -m nautilus_quants.alpha mine config/cs/alpha_mining.yaml
#   python -m nautilus_quants.alpha mine config/cs/alpha_mining.yaml --rounds 3
#   python -m nautilus_quants.alpha mine config/cs/alpha_mining.yaml --hypothesis "volume divergence"

registry:
  env: test
  db_dir: /Users/joe/Sync/nautilus_quants/logs/registry
  enabled: true

# ── Mining settings (only used by `alpha mine`) ──
mining:
  source: "llm_claude"                   # factor source name in registry
  factors_per_round: 8
  model: "sonnet"                        # sonnet / opus
  proxy: "http://127.0.0.1:8888"        # SSH tunnel proxy for claude CLI
  parallel: 3                         # concurrent claude requests per batch
  output_dir: "logs/alpha_mining"

# Charts (only these 6; empty list = no charts)
charts:
  - quantile_returns_bar
  - monthly_ic_heatmap
  - cumulative_returns
  - turnover
  - cumulative_returns_long_short
  - ic_histogram

# ── Data source (shared with analysis) ──
catalog_path: "/Users/joe/Sync/worktrees/feature-039-funding-rate-open-interest/data/data_4years_4h/catalog"
bar_spec: "4h"

# FR/OI data injection
funding_rate: true
oi_data_path: "/Users/joe/Sync/worktrees/feature-039-funding-rate-open-interest/data/data_4years_4h/catalog"
oi_timeframe: "4h"

# factor_config_path: auto-generated per round by miner
# factors: auto-generated per round (empty = analyze all)


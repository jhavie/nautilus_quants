# CS Strategy Backtest — 40 Coins Alpha Universe (Spot)
# TopKDropout, fixed position 500u, 10 long + 10 short
# Data: 2021-01-01 ~ 2024-12-31 (spot 4h bars)

venues:
  - name: "BINANCE"
    oms_type: "NETTING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "10000 USDT"
    default_leverage: 1

data:
  - catalog_path: "data/cs_alpha_spot/catalog"
    data_cls: "nautilus_trader.model.data:Bar"
    bar_spec: "4h"
    instrument_ids: &instrument_ids
      # --- L1 (2017) ---
      - "BTCUSDT.BINANCE"
      - "ETHUSDT.BINANCE"
      - "LTCUSDT.BINANCE"
      - "BNBUSDT.BINANCE"
      - "XRPUSDT.BINANCE"
      - "ETCUSDT.BINANCE"
      # - "EOSUSDT.BINANCE"
      - "XLMUSDT.BINANCE"
      - "TRXUSDT.BINANCE"
      - "BCHUSDT.BINANCE"
      - "LINKUSDT.BINANCE"
      - "ADAUSDT.BINANCE"
      # --- Privacy (2017) ---
      - "XMRUSDT.BINANCE"
      - "DASHUSDT.BINANCE"
      - "ZECUSDT.BINANCE"
      # --- L1 / L2 / Fan (2018-2019) ---
      - "VETUSDT.BINANCE"
      - "THETAUSDT.BINANCE"
      - "FETUSDT.BINANCE"
      - "ATOMUSDT.BINANCE"
      - "MATICUSDT.BINANCE"
      - "CHZUSDT.BINANCE"
      - "DOGEUSDT.BINANCE"
      - "HBARUSDT.BINANCE"
      - "STXUSDT.BINANCE"
      - "ALGOUSDT.BINANCE"
      # --- DeFi / L1 / GameFi (2020) ---
      - "COMPUSDT.BINANCE"
      - "SOLUSDT.BINANCE"
      - "CRVUSDT.BINANCE"
      - "SANDUSDT.BINANCE"
      - "DOTUSDT.BINANCE"
      - "UNIUSDT.BINANCE"
      - "AVAXUSDT.BINANCE"
      - "AAVEUSDT.BINANCE"
      - "FILUSDT.BINANCE"
      - "NEARUSDT.BINANCE"
      - "INJUSDT.BINANCE"
      - "RUNEUSDT.BINANCE"
      - "MKRUSDT.BINANCE"
      - "GRTUSDT.BINANCE"
      - "AXSUSDT.BINANCE"
    start_time: "2022-01-01"
    end_time: "2022-12-31"

engine:
  trader_id: "BACKTESTER-CS-40COINS"
  logging:
    log_level: "INFO"
  risk_engine:
    bypass: true

  actors:
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cs/factors_alpha101.yaml"
        interval: "4h"
        signal_prefix: "factor"
        max_history: 0
        publish_signals: true

    - actor_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActor"
      config_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActorConfig"
      config:
        interval: "4h"
        venue_name: "BINANCE"
        currency: "USDT"

    - actor_path: "nautilus_quants.strategies.cs.decision_engine:DecisionEngineActor"
      config_path: "nautilus_quants.strategies.cs.config:DecisionEngineActorConfig"
      config:
        venue_name: "BINANCE"
        composite_factor: "composite"
        rebalance_interval: 1
        selection_policy: "FMZSelectionPolicy"
        position_mode: "fixed"
        position_value: 300
        n_long: 15
        n_short: 15

  strategies:
    - strategy_path: "nautilus_quants.strategies.cs.strategy:CSStrategy"
      config_path: "nautilus_quants.strategies.cs.config:CSStrategyConfig"
      config:
        instrument_ids: *instrument_ids
        execution_policy: "MarketExecutionPolicy"
        # bracket:
        #   take_profit_pct: 0.05
        #   stop_loss_pct: 0.1

report:
  output_dir: "logs/performance_40coins"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "CS 40-Coin Alpha Strategy (2021-2024)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "CS 40-Coin QuantStats Analysis"
    output_format:
      - html
      - png
  position_viz:
    enabled: true
    title: "CS 40-Coin Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "4h"

# CS Strategy Backtest — OptimizedSelectionPolicy (risk-model-driven MVO)
#
# Pipeline (feature/047):
#   FactorEngineActor   → FactorValues (includes risk variables)
#   RiskModelActor      → Nautilus Cache (RISK_MODEL_STATE_CACHE_KEY)
#   DecisionEngineActor → OptimizedSelectionPolicy reads cache, solves MVO
#                         → RebalanceOrders
#   CSStrategy          → Execution
#   SnapshotAggregator  → snapshot:risk (exposure monitoring)
#
# Distinct from backtest.yaml only in:
#   - adds RiskModelActor to actors list
#   - DecisionEngineActor selection_policy = "OptimizedSelectionPolicy"
#   - references config/portfolio/portfolio.yaml
#
# All other sections inherited by convention (copy from backtest.yaml when
# ready for real data paths; below uses the same universe for comparability).


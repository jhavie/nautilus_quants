engine:
  trader_id: "BACKTESTER-OPT-001"
  logging:
    log_level: "INFO"
  risk_engine:
    bypass: true

  actors:
    # 1. FactorEngine — computes alpha + risk variables (feature/047 Option A:
    #    risk-only variables are appended to factors_alpha101.yaml).
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cs/factors_alpha101.yaml"
        extra_data_path: "config/cs/extra_data.yaml"
        factor_cache_path: "data/factor_cache/cache_alpha101_optimized"
        interval: "4h"
        signal_prefix: "factor"
        max_history: 0
        publish_signals: true

    # 2. RiskModelActor — subscribes bars directly (same pattern as
    #    FactorEngineActor) and runs its own embedded FactorEngine on the
    #    portfolio.yaml risk variables. Independent of the alpha pipeline.
    - actor_path: "nautilus_quants.actors.risk_model:RiskModelActor"
      config_path: "nautilus_quants.actors.risk_model:RiskModelActorConfig"
      config:
        portfolio_config_path: "config/portfolio/portfolio.yaml"
        update_interval_bars: 2          # daily recompute at 4h bars
        extra_data_path: "config/cs/extra_data.yaml"  # shared with FactorEngineActor
        max_history: 240                  # = fundamental.common.lookback_bars
        flush_timeout_secs: 5

    - actor_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActor"
      config_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActorConfig"
      config:
        interval: "4h"
        venue_name: "BINANCE"
        currency: "USDT"

    # 3. DecisionEngine — OptimizedSelectionPolicy reads cache, solves MVO.
    #    NOTE: on_start / on_data code UNCHANGED vs baseline; cache injection
    #    happens only in _build_selection_policy factory branch.
    - actor_path: "nautilus_quants.strategies.cs.decision_engine:DecisionEngineActor"
      config_path: "nautilus_quants.strategies.cs.config:DecisionEngineActorConfig"
      config:
        composite_factor: "composite"
        rebalance_interval: 2

        selection_policy: "OptimizedSelectionPolicy"
        position_mode: "weighted"
        total_capital: 20000

        optimized_portfolio_config_path: "config/portfolio/portfolio.yaml"
        optimized_max_snapshot_age_ns: 86_400_000_000_000  # 1 day

        # When risk snapshot is missing / stale / optimizer infeasible,
        # OptimizedSelectionPolicy.select returns None and DecisionEngineActor
        # treats it as "no opinion" — current positions are held as-is.

  strategies:
    - strategy_path: "nautilus_quants.strategies.cs.strategy:CSStrategy"
      config_path: "nautilus_quants.strategies.cs.config:CSStrategyConfig"
      config:
        instrument_ids: *instrument_ids
        execution_policy: "MarketExecutionPolicy"


report:
  output_dir: "logs/performance_optimized"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "CS Strategy Optimized (Risk Model + MVO)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "CS Optimized QuantStats"
    output_format:
      - html
      - png
  position_viz:
    enabled: true
    title: "CS Optimized Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "4h"

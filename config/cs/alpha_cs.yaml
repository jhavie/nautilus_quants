# Alpha Factor Analysis — CS Alpha Neutral Momentum
# Evaluates IC/ICIR for the three sub-factors + composite over 4 years
#
# Usage:
#   python -m nautilus_quants.alpha analyze config/cs/alpha_cs.yaml

# Data source (spot 4h bars, 40-coin universe)
catalog_path: "data/cs_alpha_spot/catalog"
bar_spec: "4h"

# Factor definition
factor_config_path: "config/cs/factors_alpha_cs.yaml"

# Instrument universe — 35 active coins (40 minus EOS/XMR/MATIC/AAVE/MKR)
instrument_ids:
    # --- L1 (2017) ---
    - "BTCUSDT.BINANCE"
    - "ETHUSDT.BINANCE"
    - "LTCUSDT.BINANCE"
    - "BNBUSDT.BINANCE"
    - "XRPUSDT.BINANCE"
    - "ETCUSDT.BINANCE"
    - "EOSUSDT.BINANCE"
    - "XLMUSDT.BINANCE"
    - "TRXUSDT.BINANCE"
    - "BCHUSDT.BINANCE"
    - "LINKUSDT.BINANCE"
    - "ADAUSDT.BINANCE"
    # --- Privacy (2017) ---
    - "XMRUSDT.BINANCE"
    - "DASHUSDT.BINANCE"
    - "ZECUSDT.BINANCE"
    # --- L1 / L2 / Fan (2018-2019) ---
    - "VETUSDT.BINANCE"
    - "THETAUSDT.BINANCE"
    - "FETUSDT.BINANCE"
    - "ATOMUSDT.BINANCE"
    - "MATICUSDT.BINANCE"
    - "CHZUSDT.BINANCE"
    - "DOGEUSDT.BINANCE"
    - "HBARUSDT.BINANCE"
    - "STXUSDT.BINANCE"
    - "ALGOUSDT.BINANCE"
    # --- DeFi / L1 / GameFi (2020) ---
    - "COMPUSDT.BINANCE"
    - "SOLUSDT.BINANCE"
    - "CRVUSDT.BINANCE"
    - "SANDUSDT.BINANCE"
    - "DOTUSDT.BINANCE"
    - "UNIUSDT.BINANCE"
    - "AVAXUSDT.BINANCE"
    - "AAVEUSDT.BINANCE"
    - "FILUSDT.BINANCE"
    - "NEARUSDT.BINANCE"
    - "INJUSDT.BINANCE"
    - "RUNEUSDT.BINANCE"
    - "MKRUSDT.BINANCE"
    - "GRTUSDT.BINANCE"
    - "AXSUSDT.BINANCE"

# Factors to analyze (3 sub-factors + composite)
factors:
  - alpha_mom      # Market-neutral momentum (vector_neut residual)
  - vp_corr        # Volume-price correlation
  - skew_raw       # Return skewness (raw, before negation)
  - alpha_score    # Composite: 0.4*mom + 0.3*corr + 0.3*skew

# Alphalens parameters
# 4h bars: 1=4h, 3=12h, 6=1d, 12=2d, 18=3d, 42=7d
periods: [1, 3, 6, 12, 18, 42]
quantiles: 5
max_loss: 0.3
filter_zscore: 20.0

# Charts per factor
charts:
  # Returns analysis
  - quantile_returns_bar
  - quantile_returns_violin
  - cumulative_returns
  - quantile_spread
  # IC analysis
  - ic_time_series
  - monthly_ic_heatmap
  # Turnover analysis
  - turnover

# Output
output_dir: "logs/alpha_cs_analysis"
output_format:
  - png

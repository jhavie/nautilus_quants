# Alpha Factor Mining + Tuning — SanAPI (cross-exchange aggregated derivatives + attention)
#
# Usage:
#   python -m nautilus_quants.alpha mine config/cs/alpha_mining_sanapi.yaml --rounds 3
#   python -m nautilus_quants.alpha tune config/cs/alpha_mining_sanapi.yaml
#   python -m nautilus_quants.alpha tune config/cs/alpha_mining_sanapi.yaml -e "..."
#
# Data: 78 coins with complete FR + OI (>=2000 4h bars, 2025-04 ~ 2026-03)
# Variables:
#   san_funding_rate, san_open_interest    — derivatives (FR/OI)
#   san_volume_usd, san_social_volume      — attention (cross-exchange + social)
#   OHLCV + quote_volume + btc/eth_close   — standard
# Directions:
#   sentiment — FR/OI derivatives signals
#   attention — cross-exchange volume + social signals

registry:
  env: test
  db_dir: /Users/joe/Sync/nautilus_quants/logs/registry
  enabled: true

# ── Mining settings ──
mining:
  source: "llm_sanapi"
  factors_per_round: 8
  model: "sonnet"
  proxy: "http://127.0.0.1:8888"
  parallel: 3
  output_dir: "logs/alpha_mining_sanapi"

  # ── Complexity constraints ──
  constraints:
    max_char_length: 200
    max_node_count: 30
    max_depth: 8
    max_func_nesting: 4
    max_variables: 5
    max_window: 720
    max_numeric_ratio: 0.4

  # ── Two directions: sentiment (derivatives) + attention (volume/social) ──
  directions:
    sentiment:
      theme: >-
        Sentiment factors via cross-exchange aggregated derivatives data.
        Explore how san_funding_rate and san_open_interest predict returns.
        Key patterns: FR extreme reversal, FR momentum, OI expansion/contraction,
        OI-price divergence, crowded positioning signals.
        san_funding_rate: aggregated across all exchanges (decimal, 0.0001=0.01%),
        native 4h granularity.
        san_open_interest: total open positions across all exchanges (USD);
        divide by close for token-base units (removes price co-movement).
        Can combine with OHLCV (close, volume, high, low) and
        quote_volume, btc_close, eth_close for cross-signal factors.
      tags: [sentiment, san_funding_rate, san_open_interest]
      rounds: 3

    attention:
      theme: >-
        Market attention factors via cross-exchange volume and social signals.
        Explore how san_volume_usd and san_social_volume predict returns.
        san_volume_usd: ROLLING 24h USD trading volume aggregated across all
        exchanges, sampled every 4h (NOT a 4h bucket). Use cs_rank for
        cross-sectional attention ranking; combine with quote_volume (Binance
        4h bucket) for exchange-concentration / dispersion signals.
        san_social_volume: total mentions across Twitter/Reddit/Telegram/4chan/
        Farcaster (count). Sudden spikes often LEAD price moves. Use relative
        change (delta/delay) or rank-of-change rather than raw counts.
        Key patterns: social burst anticipation (delta social_volume leading
        returns), volume-social divergence (hype without flow or vice versa),
        exchange concentration shift (san_volume_usd vs quote_volume),
        attention→flow transmission (corr social with volume).
      tags: [attention, san_volume_usd, san_social_volume]
      rounds: 3

# ── Tune settings (only used by `alpha tune`) ──
# Optimises parameters / operators / variables of factors already in test.duckdb
# whose source matches `candidates.source`. New variants are written back to
# test.duckdb with source="alpha_tune_sanapi".
tune:
  enabled: true
  source: "alpha_tune_sanapi"
  output_dir: "logs/alpha_tune_sanapi"

  # Pull only SanAPI-mined factors from the registry — avoid wasting trials on
  # OG Bybit factors that have no SanAPI variables to substitute.
  candidates:
    env: test
    source: "llm_sanapi"               # only LLM-mined SanAPI factors
    status: candidate
    tags: []
    eligibility:
      # Per-period AND gates; cross-period OR (any qualifying period passes
      # the factor). Tuned to skip noise but keep "potential" factors that
      # could realistically improve 2-3x with parameter / operator search.
      icir_abs_min: 0.05               # ↑ from 0.02 — 0.02 is essentially noise
      t_stat_nw_abs_min: 1.5           # 1.5σ one-tailed; rules out spurious peaks
      coverage_min: 0.30
      n_samples_min: 1000              # SanAPI window is 1 yr ≈ 2190 4h bars
      min_valid_periods: 2             # ≥1 period must clear all gates above

  # 3-dim search: SanAPI variables open up rich substitution opportunities
  # (san_funding_rate ↔ funding_rate is intentionally NOT in any group — they
  # come from different sources / time spans, never substitutable).
  dimensions:
    numeric: true
    operators: true        # cs_rank → cs_zscore / winsorize / clip_quantile
    variables: true        # btc_close ↔ eth_close, btc_beta ↔ eth_beta, etc.

  by_prototype: true
  algorithm: "tpe"
  trials: 200              # 3-dim search needs more trials than 1-dim
  # Parallel Optuna trials within one study. Objective is DB-free so threads
  # only share immutable panel data — safe without locks. 4 is the sweet spot
  # on 10+ core machines: ~2.2x speedup, past which GIL (Python AST walk)
  # caps returns. Set to 1 for strictly reproducible results.
  n_jobs: 4
  # Convergence early-stop: if this many consecutive trials sample the same
  # parameter tuple, stop the study — TPE has converged and further trials
  # are redundant. Set to 0 to disable. Typical saving: 30-50% trials per
  # factor when TPE locks onto a sharp optimum.
  early_stop_patience: 20
  early_stop_min_trials: 30  # don't check for convergence before TPE has
                             # explored the space (warm-up)
  timeout: 3600
  seed: 42
  register_top_k: 3

  cv:
    method: "expanding"
    n_folds: 3
    test_ratio: 0.167      # ~60 days per fold given 1-yr SanAPI window
    holdout_ratio: 0.167
    gap_bars: 0

  stability_min: 0.5
  correction_method: "bonferroni"
  significance_alpha: 0.05

  charts: []
  # charts:
  #   - optimization_history
  #   - parameter_importance
  #   - operator_comparison
  #   - variable_comparison

# ── Charts ──
charts:
  - quantile_returns_bar
  - monthly_ic_heatmap
  - cumulative_returns
  - cumulative_returns_long_short
  - ic_histogram
  - turnover

# ── Data source ──
catalog_path: "/Users/joe/Sync/nautilus_quants2/data/data_4years_4h/catalog"
bar_spec: "4h"

# Time range: align with SanAPI data availability
start_date: "2025-04-12"
end_date: "2026-03-12"

# SanAPI-only extra data
extra_data_path: "config/cs/extra_data_sanapi.yaml"


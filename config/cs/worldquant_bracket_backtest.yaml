# WorldQuant BRAIN + Bracket TP/SL Backtest Configuration
# 验证 WorldQuantSelectionPolicy + BracketConfig 集成
#
# 使用与 CS backtest 相同的 125 Symbols 和 4h Bar 数据
# WorldQuant BRAIN pipeline: delay=1, neutralize, scale, no decay/truncation
# Bracket: stop_loss_pct=0.02, no take_profit
#
# 运行:
#   python -m nautilus_quants.backtest run config/cs/worldquant_bracket_backtest.yaml


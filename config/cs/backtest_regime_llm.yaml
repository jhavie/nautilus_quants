engine:
  trader_id: "BACKTESTER-CS-001"
  logging:
    log_level: "INFO"
  risk_engine:
    bypass: true

  actors:
    # 1) Factor Engine: 10 LLM Claude factors
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cs/factors_llm_claude.yaml"
        # factor_cache_path: "data/factor_cache/cache_alpha101_llm_claude"
        interval: "4h"
        signal_prefix: "factor"
        max_history: 100
        publish_signals: true

    # 2) Regime Composite: schedule lookup from regime_config.yaml
    - actor_path: "nautilus_quants.actors.regime_composite:RegimeCompositeActor"
      config_path: "nautilus_quants.actors.regime_composite:RegimeCompositeActorConfig"
      config:
        regime_config_path: "logs/regime_llm_claude/regime_20260406_141742/regime_config.yaml"
        regime_method: "jump_model"   # or "ema"
        composite_name: "regime_composite"

    # 3) Equity Snapshot
    - actor_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActor"
      config_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActorConfig"
      config:
        interval: "4h"
        venue_name: "BINANCE"
        currency: "USDT"

    # 4) Decision Engine: consumes regime-aware composite
    - actor_path: "nautilus_quants.strategies.cs.decision_engine:DecisionEngineActor"
      config_path: "nautilus_quants.strategies.cs.config:DecisionEngineActorConfig"
      config:
        composite_factor: "regime_composite"
        rebalance_interval: 2
        selection_policy: "TopKDropoutSelectionPolicy"
        position_mode: "fixed"
        position_value: 250
        topk_long: 40
        topk_short: 40
        n_drop_long: 4
        n_drop_short: 4

  strategies:
    - strategy_path: "nautilus_quants.strategies.cs.strategy:CSStrategy"
      config_path: "nautilus_quants.strategies.cs.config:CSStrategyConfig"
      config:
        instrument_ids: *instrument_ids
        execution_policy: "MarketExecutionPolicy"

report:
  output_dir: "logs/performance"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "CS Regime-Aware Backtest (LLM Claude + JM)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "CS Regime-Aware QuantStats Analysis"
    output_format:
      - html
      - png
  position_viz:
    enabled: true
    title: "CS Regime-Aware Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "4h"

# CS Strategy Backtest — Regime-Aware (LLM Claude Factors)
#
# Pipeline:
#   FactorEngineActor → 10 LLM Claude factors
#     → RegimeCompositeActor → regime composite (from regime_config.yaml)
#       → DecisionEngineActor → RebalanceOrders → CSStrategy
#
# Usage:
#   1. Generate regime_config.yaml:
#      python -m nautilus_quants.alpha regime config/cs/regime_llm_claude.yaml -v
#   2. Update regime_config_path below to point to the output
#   3. Run backtest:
#      python -m nautilus_quants.backtest run config/cs/backtest_regime_llm.yaml -v
#
# 115 Symbols, 4h bars, 2022-01-01 ~ 2025-12-31
# 初始资金: 10000 USDT, 持仓: 多空各40, TopKDropout n_drop=4


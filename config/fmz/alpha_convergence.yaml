# Factors to analyze (article factors + composite)
factors:
  - pcf
  - vcf
  - acf
  - trcf
  - composite
  # - composite  # Alias of pvcf, keep disabled to avoid duplicate analysis

# Alphalens parameters
periods: [1, 3, 6, 12, 18]   # forward returns: 1h, 4h, 8h, 24h, 48h, 72h
quantiles: 5
max_loss: 0.3
filter_zscore: 20.0

# Charts per factor
charts:
  # Returns analysis
  - quantile_returns_bar
  - quantile_returns_violin
  - cumulative_returns
  # - cumulative_returns_long_short
  - quantile_spread
  # - returns_table
  # IC analysis
  - ic_time_series
  # - ic_histogram
  # - ic_qq
  - monthly_ic_heatmap
  # Turnover analysis
  - turnover
  # - turnover_table
  # - factor_rank_autocorrelation
  # Event study & distribution
  # - event_study
  # - events_distribution
  # - quantile_statistics_table

# Output
output_dir: "logs/alpha_convergence"
output_format:

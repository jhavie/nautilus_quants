# Alpha101 6-Factor Composite Strategy Configuration
# Based on alpha analysis scoring results
#
# Composite formula:
#   0.25 * alpha035 + 0.20 * alpha026 + 0.20 * (-1 * alpha101) + 0.15 * alpha006 + 0.10 * alpha012 + 0.10 * alpha049
#
# Factor sources (from config/examples/factors.yaml):
#   - alpha035: Volume × range × return three-dimensional factor (volume, weight 0.25)
#   - alpha026: Max volume-high time-series rank correlation (volume, weight 0.20)
#   - alpha101: K-line body-to-range ratio — inverted (momentum, weight 0.20)
#   - alpha006: Open-volume correlation (volume, weight 0.15)
#   - alpha012: Volume-price divergence reversal (volume, weight 0.10)
#   - alpha049: Acceleration decline signal (momentum, weight 0.10)
#
# Normalization: quantile(0.2, 0.8) clip + z-score (same as FMZ 4-factor)
#
# Composite weights sum to 1.0

metadata:
  name: alpha101_6factor
  version: "1.0"
  description: "Alpha101 6-factor composite based on IC/ICIR alpha analysis scoring"

variables:
  returns: "delta(close, 1) / delay(close, 1)"

factors:
  # ========== 原始因子 (Phase 1: Time-Series) ==========

  # Alpha#35: Volume × range × return three-dimensional factor
  alpha035:
    expression: "ts_rank(volume, 32) * (1 - ts_rank(close + high - low, 16)) * (1 - ts_rank(returns, 32))"
    description: "Alpha#35: Volume × range × return three-dimensional factor"
    category: "volume"

  # Alpha#26: Max volume-high time-series rank correlation
  alpha026:
    expression: "-1 * ts_max(correlation(ts_rank(volume, 5), ts_rank(high, 5), 5), 3)"
    description: "Alpha#26: Max volume-high time-series rank correlation"
    category: "volume"

  # Alpha#101: K-line body-to-range ratio (inverted in composite)
  alpha101:
    expression: "(close - open) / ((high - low) + 0.001)"
    description: "Alpha#101: K-line body-to-range ratio"
    category: "momentum"

  # Alpha#6: Open-volume correlation
  alpha006:
    expression: "-1 * correlation(open, volume, 10)"
    description: "Alpha#6: Open-volume correlation (simplest price-volume factor)"
    category: "volume"

  # Alpha#12: Volume-price divergence reversal
  alpha012:
    expression: "sign(delta(volume, 1)) * -1 * delta(close, 1)"
    description: "Alpha#12: Volume-price divergence reversal"
    category: "volume"

  # Alpha#49: Acceleration decline signal
  alpha049:
    expression: "if_else((delay(close, 20) - delay(close, 10)) / 10 - (delay(close, 10) - close) / 10 < -0.1, 1, -1 * delta(close, 1))"
    description: "Alpha#49: Acceleration decline signal"
    category: "momentum"

  # ========== 归一化因子 (Phase 2: Cross-Sectional) ==========
  # quantile(0.2, 0.8) clip + z-score normalization

  alpha035_norm:
    expression: "normalize(clip_quantile(alpha035, 0.2, 0.8), true, 0)"
    description: "Normalized alpha035 (quantile clip + z-score)"

  alpha026_norm:
    expression: "normalize(clip_quantile(alpha026, 0.2, 0.8), true, 0)"
    description: "Normalized alpha026 (quantile clip + z-score)"

  alpha101_norm:
    expression: "normalize(clip_quantile(alpha101, 0.2, 0.8), true, 0)"
    description: "Normalized alpha101 (quantile clip + z-score)"

  alpha006_norm:
    expression: "normalize(clip_quantile(alpha006, 0.2, 0.8), true, 0)"
    description: "Normalized alpha006 (quantile clip + z-score)"

  alpha012_norm:
    expression: "normalize(clip_quantile(alpha012, 0.2, 0.8), true, 0)"
    description: "Normalized alpha012 (quantile clip + z-score)"

  alpha049_norm:
    expression: "normalize(clip_quantile(alpha049, 0.2, 0.8), true, 0)"
    description: "Normalized alpha049 (quantile clip + z-score)"

  # ========== 6 因子合成 ==========
  # 0.25 * alpha035 + 0.20 * alpha026 + 0.20 * (-1 * alpha101) + 0.15 * alpha006 + 0.10 * alpha012 + 0.10 * alpha049
  composite:
    expression: "0.25 * alpha035_norm + 0.20 * alpha026_norm + 0.20 * (-1 * alpha101_norm) + 0.15 * alpha006_norm + 0.10 * alpha012_norm + 0.10 * alpha049_norm"
    description: "6-factor composite: alpha035(0.25) + alpha026(0.20) + -alpha101(0.20) + alpha006(0.15) + alpha012(0.10) + alpha049(0.10)"

performance:
  enable_timing: true
  warning_threshold_ms: 1.0

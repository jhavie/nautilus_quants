  # when actors/strategies subscribe to *-LAST-INTERNAL bar types
  - catalog_path: "data/transform/tardis"
    data_cls: "nautilus_trader.model.data:TradeTick"
    start_time: "2025-10-09"
    end_time: "2025-10-12"
    instrument_ids: &instrument_ids
      # --- 1000X contracts (Binance micro-denomination) ---
      - "1000BONKUSDT-PERP.BINANCE"
      - "1000FLOKIUSDT-PERP.BINANCE"
      - "1000PEPEUSDT-PERP.BINANCE"
      - "1000SATSUSDT-PERP.BINANCE"
      - "1000SHIBUSDT-PERP.BINANCE"
      # --- High activity (volume > 30M/day) ---

# FMZ Alpha101 8-Factor Strategy - Limit Order Execution (60 Tardis Coins)
#
# Uses PostLimitExecAlgorithm (BBO-pegged limit orders) with Tardis tick data.
# Factor config: factors_alpha3.yaml (8-factor composite, ICIR ~0.40+)
#
# Data source: Tardis tick data (TradeTick + QuoteTick)
#   - TradeTick: aggregated to 4h INTERNAL bars for factor signals,
#                and 1s INTERNAL bars for strategy execution
#   - QuoteTick: BBO pegging for limit order placement
#
# bar_types are manually specified because TradeTick has no bar_spec,
# so inject_data_configs cannot auto-generate them.
# DataEngine auto-creates TimeBarAggregator for INTERNAL subscriptions.
#
# Available Tardis data date ranges (60 coins, trades + quotes):
#   2025-01-01 ~ 2025-01-02  (2 days)
#   2025-02-01 ~ 2025-02-04  (4 days)
#   2025-04-09 ~ 2025-05-09  (31 days)  <-- recommended
#   2025-10-09 ~ 2025-10-11  (3 days)
#
# Run:
#   python -m nautilus_quants.backtest run config/fmz/backtest_limit.yaml

venues:
  - name: "BINANCE"
    oms_type: "HEDGING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "10000 USDT"
    default_leverage: 5
    bar_execution: true
    trade_execution: true

data:

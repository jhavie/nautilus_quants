      - "MANAUSDT-PERP.BINANCE"
      - "MEMEUSDT-PERP.BINANCE"
      - "PEOPLEUSDT-PERP.BINANCE"
      - "POLUSDT-PERP.BINANCE"
      - "PYTHUSDT-PERP.BINANCE"

      - "STRKUSDT-PERP.BINANCE"
      - "XTZUSDT-PERP.BINANCE"
      - "ZKUSDT-PERP.BINANCE"
      # --- Ordinals / BRC-20 ---
      - "ORDIUSDT-PERP.BINANCE"

  # QuoteTick data — BBO pegging for PostLimitExecAlgorithm
  - catalog_path: "data/transform/tardis"
    data_cls: "nautilus_trader.model.data:QuoteTick"
    start_time: "2025-10-09"
    end_time: "2025-10-12"
    instrument_ids: *instrument_ids

engine:
  trader_id: "BACKTESTER-FMZ-LIMIT-001"
  logging:
    log_level: "INFO"

  actors:
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/fmz/factors_alpha3.yaml"
        # NOTE: FactorEngineActorConfig has NO interval field.
        # Use bar_types to explicitly specify INTERNAL bars.
        signal_prefix: "factor"
        max_history: 0
        publish_signals: true
        instrument_ids: *instrument_ids
        # 60 x 4-HOUR-LAST-INTERNAL — DataEngine aggregates TradeTick → 4h bars
        bar_types:
          - "1000BONKUSDT-PERP.BINANCE-4-HOUR-LAST-INTERNAL"
          - "1000FLOKIUSDT-PERP.BINANCE-4-HOUR-LAST-INTERNAL"

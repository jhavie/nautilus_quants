      - "WUSDT-PERP.BINANCE"
      - "XLMUSDT-PERP.BINANCE"
      - "ZROUSDT-PERP.BINANCE"
      # --- Medium activity (volume 5-30M/day) ---
      - "AGLDUSDT-PERP.BINANCE"

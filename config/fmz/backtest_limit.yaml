report:
  output_dir: "logs/performance_limit"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "FMZ Alpha101 8-Factor - Limit Order Execution (60 Coins)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:
    enabled: true
    title: "FMZ Alpha101 8-Factor - Limit Order Execution (60 Coins)"
    output_format:
      - html
      - png
  position_viz:
    enabled: false
    title: "FMZ 4-Factor Position Timeline"
    output_subdir: "echarts"
    chart_height: 500
    interval: "8h"

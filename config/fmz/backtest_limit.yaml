          - "ZKUSDT-PERP.BINANCE-4-HOUR-LAST-INTERNAL"
          - "ORDIUSDT-PERP.BINANCE-4-HOUR-LAST-INTERNAL"

    - actor_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActor"
      config_path: "nautilus_quants.actors.equity_snapshot:EquitySnapshotActorConfig"
      config:
        interval: "4h"  # EquitySnapshotActorConfig HAS interval field (timer-based)
        venue_name: "BINANCE"
        currency: "USDT"

  # PostLimitExecAlgorithm - BBO-pegged limit orders with chase + market fallback
  exec_algorithms:
    - exec_algorithm_path: "nautilus_quants.execution.post_limit.algorithm:PostLimitExecAlgorithm"
      config_path: "nautilus_quants.execution.post_limit.config:PostLimitExecAlgorithmConfig"
      config:
        exec_algorithm_id: "PostLimit"
        offset_ticks: 0           # 0=BBO pegging, 1=improve 1 tick
        timeout_secs: 15.0        # Cancel and re-post after 15s
        max_chase_attempts: 3     # Max chase iterations
        chase_step_ticks: 1       # Move 1 tick per chase
        fallback_to_market: true  # Market order after max chase
        post_only: true           # Maker-only (save fees)

  strategies:
    - strategy_path: "nautilus_quants.strategies.fmz.strategy:FMZFactorStrategy"
      config_path: "nautilus_quants.strategies.fmz.strategy:FMZFactorStrategyConfig"
      config:
        execution_mode: "post_limit"  # Use PostLimitExecAlgorithm
        instrument_ids: *instrument_ids
        n_long: 20
        n_short: 20
        position_value: 250
        rebalance_interval: 1
        composite_factor: "alpha044"
        # 60 x 1-SECOND-LAST-INTERNAL — DataEngine aggregates TradeTick → 1s bars
        bar_types:

# Alpha101 8-Factor Composite Strategy Configuration (方案 A)
# Based on PanelEvaluator alpha analysis scoring (20260301_113217)
#
# Composite formula:
#   0.20 * alpha044 + 0.15 * alpha033 + 0.15 * alpha017
#   + 0.12 * alpha026 + 0.12 * alpha055
#   + 0.10 * alpha002 + 0.10 * alpha039 + 0.06 * alpha003
#
# Factor selection rationale:
#   - alpha044: ICIR=0.265, IC(1d)=0.046 — 全局最强
#   - alpha033: ICIR=0.236, 4h IC=0.047 — 最高短期 IC
#   - alpha017: ICIR=0.260 — 趋势×加速×成交量三维信号
#   - alpha026: ICIR=0.179 — 慢速因子，IC 持续增长
#   - alpha055: ICIR=0.174 — 慢速因子，IC 逆向增强
#   - alpha002: ICIR=0.179 — 量价变化率，持久慢因子
#   - alpha039: ICIR=0.168 — 最正交因子 (max ρ=0.20)
#   - alpha003: ICIR=0.127, 3d IC=0.041 — 最慢因子 (IC 增长 115%)
#
# 两两最大相关性: 0.41 (alpha033 vs alpha017), 平均相关性 ≈ 0.12
# 预期组合 ICIR ≈ 0.40+
#
# Normalization: z-score only (no quantile clip — FMZ is rank-based, clipping hurts tail discrimination)
#
# Sign convention: FMZ longs bottom N (smallest) / shorts top N (largest).
#   Alpha analysis shows -1*expr has positive IC (higher → better returns).
#   For FMZ we REMOVE the -1* so lowest values = best returns = longed.
#
# Composite weights sum to 1.0

metadata:
  name: alpha101_8factor
  version: "2.0"
  description: "Alpha101 8-factor composite based on PanelEvaluator alpha analysis (方案A)"

variables:
  returns: "delta(close, 1) / delay(close, 1)"

factors:
  # ==========================================================================
  # Phase 1: 原始因子 (Time-Series + Cross-Sectional via PanelEvaluator)
  # ==========================================================================

  # 量价rank相关因子 — 全局最高 ICIR=0.265
  alpha044:
    expression: "correlation(high, rank(volume), 5)"
    description: "Alpha#44: High-price vs volume rank correlation"
    category: "volume"

  # 开盘/收盘比率因子 — 全局最高 4h IC=0.047
  alpha033:
    expression: "rank(1 - open / close)"
    description: "Alpha#33: Open/close ratio rank"
    category: "momentum"

  # 趋势×加速×相对成交量三维因子 — ICIR=0.260
  alpha017:
    expression: "rank(ts_rank(close, 10)) * rank(delta(delta(close, 1), 1)) * rank(ts_rank(volume / ts_mean(volume, 20), 5))"
    description: "Alpha#17: Trend × acceleration × relative volume triple product"
    category: "liquidity"

  # 量价时序排名极值因子 — 慢速因子, IC 从 4h→1d 增长 53%
  alpha026:
    expression: "ts_max(correlation(ts_rank(volume, 5), ts_rank(high, 5), 5), 3)"
    description: "Alpha#26: Max volume-high time-series rank correlation"
    category: "volume"

  # 随机振荡-成交量相关因子 — 慢速因子, IC 持续增长
  alpha055:
    expression: "correlation(rank((close - ts_min(low, 12)) / replace_zero(ts_max(high, 12) - ts_min(low, 12), 0.0001)), rank(volume), 6)"
    description: "Alpha#55: Stochastic oscillator vs volume rank correlation"
    category: "volume"

  # 成交量变化率-日内收益相关因子 — 持久慢因子
  alpha002:
    expression: "correlation(rank(delta(log(volume), 2)), rank((close - open) / open), 6)"
    description: "Alpha#2: Volume change rate vs intraday return correlation"
    category: "volume"

  # 动量×成交量流衰减×长期反转 — 最正交因子
  alpha039:
    expression: "rank(delta(close, 7) * (1 - rank(decay_linear(volume / ts_mean(volume, 20), 9)))) * (1 + rank(ts_mean(returns, 250)))"
    description: "Alpha#39: Momentum × volume flow decay × long-term reversal"
    category: "composite"

  # 开盘-成交量排名相关 — 最慢因子 (3d IC=0.041, +115%)
  alpha003:
    expression: "correlation(rank(open), rank(volume), 10)"
    description: "Alpha#3: Open-volume rank correlation"
    category: "volume"

  # ==========================================================================
  # Phase 2: 归一化因子 (Cross-Sectional z-score only)
  # ==========================================================================

  alpha044_norm:
    expression: "normalize(alpha044, true, 0)"
    description: "Normalized alpha044 (z-score)"

  alpha033_norm:
    expression: "normalize(alpha033, true, 0)"
    description: "Normalized alpha033 (z-score)"

  alpha017_norm:
    expression: "normalize(alpha017, true, 0)"
    description: "Normalized alpha017 (z-score)"

  alpha026_norm:
    expression: "normalize(alpha026, true, 0)"
    description: "Normalized alpha026 (z-score)"

  alpha055_norm:
    expression: "normalize(alpha055, true, 0)"
    description: "Normalized alpha055 (z-score)"

  alpha002_norm:
    expression: "normalize(alpha002, true, 0)"
    description: "Normalized alpha002 (z-score)"

  alpha039_norm:
    expression: "normalize(alpha039, true, 0)"
    description: "Normalized alpha039 (z-score)"

  alpha003_norm:
    expression: "normalize(alpha003, true, 0)"
    description: "Normalized alpha003 (z-score)"

  # ==========================================================================
  # Phase 3: 8 因子合成
  # ==========================================================================

  composite:
    expression: "0.20 * alpha044_norm + 0.15 * alpha033_norm + 0.15 * alpha017_norm + 0.12 * alpha026_norm + 0.12 * alpha055_norm + 0.10 * alpha002_norm + 0.10 * alpha039_norm + 0.06 * alpha003_norm"
    description: "8-factor composite: alpha044(0.20) + alpha033(0.15) + alpha017(0.15) + alpha026(0.12) + alpha055(0.12) + alpha002(0.10) + alpha039(0.10) + alpha003(0.06)"

  composite_neg:
    expression: "-0.20 * alpha044_norm - 0.15 * alpha033_norm - 0.15 * alpha017_norm - 0.12 * alpha026_norm - 0.12 * alpha055_norm - 0.10 * alpha002_norm - 0.10 * alpha039_norm - 0.06 * alpha003_norm"
    description: "8-factor composite: alpha044(0.20) + alpha033(0.15) + alpha017(0.15) + alpha026(0.12) + alpha055(0.12) + alpha002(0.10) + alpha039(0.10) + alpha003(0.06)"
performance:
  enable_timing: true
  warning_threshold_ms: 1.0


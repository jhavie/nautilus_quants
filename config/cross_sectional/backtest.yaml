# 多因子截面选币策略回测配置
# https://www.fmz.com/digest-topic/9647

venues:
  - name: "BINANCE"
    oms_type: "HEDGING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "100000 USDT"
    default_leverage: 1
    fill_model:
      fill_model_path: "nautilus_quants.backtest.models.signal_close_fill:SignalCloseFillModel"
      config_path: "nautilus_quants.backtest.models.signal_close_fill:SignalCloseFillModelConfig"
      config: {}


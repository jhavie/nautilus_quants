  - quantile_returns_bar
  - quantile_returns_violin
  - cumulative_returns
  - quantile_spread
  - ic_time_series
  - monthly_ic_heatmap
  - turnover

# Output
output_dir: "logs/alpha_101_45factors"
output_format:

# Factor Scoring, Promotion & Refinement Configuration
# Used by: python -m nautilus_quants.alpha promote --config config/examples/scoring.yaml
#
# 5-Layer Pipeline (each layer has enabled: true/false):
#   [1] hard_filters   — eliminate garbage factors
#   [2] scoring        — 4D quality ranking
#   [3] dedup          — fingerprint + correlation greedy
#   [4] clustering     — HDBSCAN + PCA → Super Alpha (default OFF)
#   [5] orthogonalization — Löwdin weight optimization (default OFF)
#
# A/B testing: copy this file, toggle enabled flags, compare backtests.

periods:
  - "4h"
  - "8h"
  - "12h"
  - "1d"

# ── Phase 1: Hard Filters ──
# Each period is checked independently; factor is eliminated only if
# ALL periods fail.  At least min_valid_periods must pass.
hard_filters:
  enabled: false                   # false = skip hard filtering
  icir_abs_min: 0.05          # |ICIR| ≥ 0.05
  t_stat_nw_abs_min: 2.0      # |t_stat_nw| ≥ 2.0
  p_value_nw_max: 0.05        # p_value_nw ≤ 0.05
  win_rate_lower: 0.45         # win_rate < 0.45 or > 0.55
  win_rate_upper: 0.55
  ic_linearity_min: 0.85      # ic_linearity ≥ 0.85
  coverage_min: 0.50           # coverage ≥ 0.50
  n_samples_min: 3000          # n_samples ≥ 3000
  min_valid_periods: 2         # at least 2 periods must pass

# ── Phase 1: Scoring Weights ──
# 4-dimension scoring: predictiveness, monotonicity, consistency, turnover
#
# Eliminated dimensions:
#   stability (ic_linearity CV=0.024 after filter, win_rate corr 0.984 with ICIR)
# Eliminated sub-metrics:
#   t_stat_nw (corr 0.978 with ICIR), win_rate, ic_linearity
scoring:
  enabled: false                   # false = skip scoring, rank by |ICIR|
  # Dimension weights (must sum to 1.0)
  weights:
    predictiveness: 0.40       # ICIR + ic_mean
    monotonicity: 0.25         # quantile return monotonicity (most independent signal)
    consistency: 0.15          # cross-period min/max ratio
    turnover_friendliness: 0.20  # IC autocorrelation (ic_ar1)

  # Sub-dimension weights
  sub_weights:
    predictiveness:
      icir: 0.65              # IC Sharpe ratio (primary)
      ic_mean: 0.35           # absolute IC strength (complementary)

# ── Phase 2: Deduplication ──
             # Max allowed |Spearman corr| between selected factors

# ── Layer 4: HDBSCAN Clustering + Super Alpha ──
# Auto-detect factor clusters, compose Super Alphas via PCA/equal/ICIR.
# Noise factors (HDBSCAN label=-1) are automatically discarded.
clustering:
  enabled: true                  # true = enable clustering (default OFF)
  min_cluster_size: 3             # HDBSCAN: at least 3 factors to form a cluster
  cluster_selection_method: "eom" # "eom" (conservative) | "leaf" (finer)
  min_samples: null               # null = defaults to min_cluster_size
  distance_metric: "spearman"     # Spearman correlation → distance = 1-|corr|
  composition_method: "pca"       # "pca" | "equal" | "icir"
  single_factor_passthrough: true # true = keep single-factor clusters as SA
  super_alpha_prefix: "SA"        # Super Alpha naming prefix
  component_status: "component"   # Original factors downgraded to this status

# ── Layer 5: Löwdin Orthogonalization ──
# Optimize composite weights to eliminate redundant exposure between factors.
orthogonalization:
  enabled: false                  # true = enable orthogonalization (default OFF)
  method: "lowdin"                # "lowdin" | "none"
  min_eigenvalue: 1.0e-6          # Regularization for near-singular matrices
  max_condition_number: 1.0e+6    # Skip and warn if condition number exceeds

dedup:
  enabled: false                   # false = skip dedup + greedy selection
  # Fingerprint-based exact dedup
  # 8-tuple: (icir_4h, ic_mean_4h, icir_8h, ic_mean_8h, icir_12h, ic_mean_12h, icir_1d, ic_mean_1d)
  fingerprint_threshold: 1.0e-3   # Euclidean distance threshold

  # Correlation-based dedup
  max_corr: 0.7     

# ── Diagnostics ──
diagnostics:
  output_dir: "logs/promote"      # Output directory for reports
  correlation_heatmap: true       # Save factor correlation heatmap
  cluster_report: true            # Save clustering report (when clustering enabled)
  score_super_alphas: true        # Run 4D scoring on Super Alphas (diagnostic only)
  overlap_validation: true        # Validate orthogonalization overlap > 0.90

# ── Promotion ──
promote:
  source_db_path: "/Users/joe/Sync/nautilus_quants/logs/registry/test.duckdb"
  target_db_path: "/Users/joe/Sync/nautilus_quants/logs/registry/dev.duckdb"
  max_factors: 50                 # Max factors to promote
  target_status: "active"         # Status for promoted factors

# ── Data paths (for correlation computation) ──
data:
  catalog_path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  bar_spec: "4h"
  # FR/OI data injection (for factors using funding_rate / open_interest variables)

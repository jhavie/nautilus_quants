# Factor Scoring & Promotion Configuration
# Used by: python -m nautilus_quants.alpha promote --config config/examples/scoring.yaml

# Periods to evaluate (all four participate in scoring)
periods:
  - "4h"
  - "8h"
  - "12h"
  - "1d"

# ── Phase 1: Hard Filters ──
# Each period is checked independently; factor is eliminated only if
# ALL periods fail.  At least min_valid_periods must pass.
hard_filters:
  icir_abs_min: 0.05          # |ICIR| ≥ 0.05
  t_stat_nw_abs_min: 2.0      # |t_stat_nw| ≥ 2.0
  p_value_nw_max: 0.05        # p_value_nw ≤ 0.05
  win_rate_lower: 0.45         # win_rate < 0.45 or > 0.55
  win_rate_upper: 0.55
  ic_linearity_min: 0.85      # ic_linearity ≥ 0.85
  coverage_min: 0.50           # coverage ≥ 0.50
  n_samples_min: 3000          # n_samples ≥ 3000
  min_valid_periods: 2         # at least 2 periods must pass

# ── Phase 1: Scoring Weights ──
# 4-dimension scoring: predictiveness, monotonicity, consistency, turnover
#
# Eliminated dimensions:
#   stability (ic_linearity CV=0.024 after filter, win_rate corr 0.984 with ICIR)
# Eliminated sub-metrics:
#   t_stat_nw (corr 0.978 with ICIR), win_rate, ic_linearity
scoring:
  # Dimension weights (must sum to 1.0)
  weights:
    predictiveness: 0.40       # ICIR + ic_mean
    monotonicity: 0.25         # quantile return monotonicity (most independent signal)
    consistency: 0.15          # cross-period min/max ratio
    turnover_friendliness: 0.20  # IC autocorrelation (ic_ar1)

  # Sub-dimension weights
  sub_weights:
    predictiveness:
      icir: 0.65              # IC Sharpe ratio (primary)
      ic_mean: 0.35           # absolute IC strength (complementary)

# ── Phase 2: Deduplication ──
dedup:
  # Fingerprint-based exact dedup
  # 8-tuple: (icir_4h, ic_mean_4h, icir_8h, ic_mean_8h, icir_12h, ic_mean_12h, icir_1d, ic_mean_1d)
  fingerprint_threshold: 1.0e-3   # Euclidean distance threshold

  # Correlation-based dedup
  max_corr: 0.5                  # Max allowed |Spearman corr| between selected factors

# ── Phase 3: Promotion ──
promote:
  max_factors: 50                 # Max factors to promote
  target_status: "active"         # Status for promoted factors

# ── Data paths (for correlation computation) ──
data:
  catalog_path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  bar_spec: "4h"
  # FR/OI data injection (for factors using funding_rate / open_interest variables)
  funding_rate: true
  oi_data_path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  # Factor config files for correlation computation

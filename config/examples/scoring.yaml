# Factor Promote Pipeline Configuration
# Used by: python -m nautilus_quants.alpha promote --config config/examples/scoring.yaml
#
# 5-Layer hot-swappable pipeline (each layer has enabled: true/false):
#
#   load → [hard_filters] → [scoring] → [dedup]
#        → [clustering] → [orthogonalization] → migrate
#
# A/B testing: copy this file, toggle enabled flags, compare backtests.

periods:
  - "4h"
  - "8h"
  - "12h"
  - "1d"

# ── [hard_filters] ──
# Each period is checked independently; factor is eliminated only if
# fewer than min_valid_periods pass ALL checks.
hard_filters:
  enabled: true                  # false = skip, all factors pass through
  icir_abs_min: 0.05
  t_stat_nw_abs_min: 2.0
  p_value_nw_max: 0.05
  win_rate_lower: 0.45
  win_rate_upper: 0.55
  ic_linearity_min: 0.85
  coverage_min: 0.50
  n_samples_min: 3000
  min_valid_periods: 2

# ── [scoring] ──
# 4-dimension scoring: predictiveness, monotonicity, consistency, turnover.
# When disabled, factors are ranked by avg |ICIR| instead.
scoring:
  enabled: true                  # false = skip, rank by |ICIR|
  weights:
    predictiveness: 0.40
    monotonicity: 0.25
    consistency: 0.15
    turnover_friendliness: 0.20
  sub_weights:
    predictiveness:
      icir: 0.65
      ic_mean: 0.35

# ── [dedup] ──
# Fingerprint exact dedup + Spearman correlation greedy selection.
dedup:
  enabled: true                  # false = skip dedup + greedy
  fingerprint_threshold: 1.0e-3
  max_corr: 0.6
  competitive: false             # true = no gatekeepers, full re-selection

# ── [clustering] ──
# Auto-detect factor clusters, compose Super Alphas via PCA/equal/ICIR.
# Noise factors (HDBSCAN label=-1) are automatically discarded.
clustering:
  enabled: false                   # false = skip, use individual factors
  min_cluster_size: 3
  cluster_selection_method: "eom" # "eom" (conservative) | "leaf" (finer)
  min_samples: null
  distance_metric: "spearman"
  composition_method: "pca"       # "pca" | "equal" | "icir"
  single_factor_passthrough: true
  super_alpha_prefix: "SA"
  component_status: "component"

# ── [orthogonalization] ──
# Optimize composite weights to eliminate redundant exposure.
orthogonalization:
  enabled: false                  # false = skip, use original weights
  method: "lowdin"
  min_eigenvalue: 1.0e-6
  max_condition_number: 1.0e+6

# ── Diagnostics ──
diagnostics:
  output_dir: "logs/promote"
  correlation_heatmap: true
  cluster_report: true
  score_super_alphas: true
  overlap_validation: true

# ── Promote ──
promote:
  source_db_path: "/Users/joe/Sync/nautilus_quants/logs/registry/test.duckdb"
  target_db_path: "/Users/joe/Sync/nautilus_quants/logs/registry/dev.duckdb"
  max_factors: 50
  target_status: "active"

# ── Data paths (for correlation computation) ──
data:
  catalog_path: "/Users/joe/Sync/nautilus_quants/data/data_4years_4h_fr_oi/catalog"
  bar_spec: "4h"
  # Extra data sources (FR, OI, quote_volume, btc_close, eth_close)
  extra_data_path: "config/cs/extra_data.yaml"
  # Per-factor panel cache (parquet); first run computes, subsequent reuse
  panels_cache_dir: "logs/scoring/panels_cache"
  # Factor config files for correlation computation

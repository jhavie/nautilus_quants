# ============================================================================
# Risk Management Configuration - MVP (最简版)
# ============================================================================

# 止损
stop_loss:
  method: "fixed_pct"           # 固定百分比止损
  pct: 0.05                     # 5% 止损

# 止盈
take_profit:
  method: "fixed_pct"           # 固定百分比止盈
  pct: 0.10                     # 10% 止盈 (盈亏比 2:1)

# 持仓时间限制 (可选)
max_holding:
  enabled: false
  bars: 168                     # 最长持仓168根K线 (7天*24小时)

# 账户级风控 (MVP简化版)
account:
  max_daily_loss_pct: 0.10      # 单日最大亏损 10% 暂停交易

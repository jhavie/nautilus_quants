engine:
  trader_id: "BACKTESTER-CS-001"
  logging:
    log_level: "INFO"
  
  actors:
    - actor_path: "nautilus_quants.factors.engine.actor:FactorEngineActor"
      config_path: "nautilus_quants.factors.engine.actor:FactorEngineActorConfig"
      config:
        factor_config_path: "config/cross_sectional_factors.yaml"
        interval: "4h"  # 使用4h K线，无需聚合
        signal_prefix: "factor"
        max_history: 100
        publish_signals: true
  
  strategies:
    - strategy_path: "nautilus_quants.strategies.cross_sectional.strategy:CrossSectionalFactorStrategy"
      config_path: "nautilus_quants.strategies.cross_sectional.strategy:CrossSectionalFactorStrategyConfig"
      config:
        instrument_ids:
          - "1000SHIBUSDT.BINANCE"
          - "AAVEUSDT.BINANCE"
          - "ADAUSDT.BINANCE"
          - "ALGOUSDT.BINANCE"
          - "ATOMUSDT.BINANCE"
          - "AVAXUSDT.BINANCE"
          - "AXSUSDT.BINANCE"
          - "BCHUSDT.BINANCE"
          - "BNBUSDT.BINANCE"
          - "BTCUSDT.BINANCE"
          - "CHZUSDT.BINANCE"
          - "CRVUSDT.BINANCE"
          - "DASHUSDT.BINANCE"
          - "DOGEUSDT.BINANCE"
          - "DOTUSDT.BINANCE"
          - "ETCUSDT.BINANCE"
          - "ETHUSDT.BINANCE"
          - "FILUSDT.BINANCE"
          - "HBARUSDT.BINANCE"
          - "ICPUSDT.BINANCE"
          - "IMXUSDT.BINANCE"
          - "INJUSDT.BINANCE"
          - "LDOUSDT.BINANCE"
          - "LINKUSDT.BINANCE"
          - "LTCUSDT.BINANCE"
          - "NEARUSDT.BINANCE"
          - "OPUSDT.BINANCE"
          - "SOLUSDT.BINANCE"
          - "TRXUSDT.BINANCE"
          - "UNIUSDT.BINANCE"
          - "VETUSDT.BINANCE"
          - "XLMUSDT.BINANCE"
          - "XRPUSDT.BINANCE"
          - "XTZUSDT.BINANCE"
          - "ZECUSDT.BINANCE"
        n_positions: 10
        position_value: 300.0
        rebalance_bars: 1
        enable_long: true
        enable_short: true
        factor_weights:
          volume: 0.6
          momentum: 0.4
          vol_change: 0.2
          volatility: 0.3
          corr: 0.4

# Project-specific configuration
report:
  output_dir: "/Users/joe/Sync/worktrees/nautilus_quants-feature-005/logs/backtest_runs"
  formats:
    - csv
    - html
  tearsheet:
    enabled: true
    title: "Cross-Sectional Factor Strategy Backtest"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns

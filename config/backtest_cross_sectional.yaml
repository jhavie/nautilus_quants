# Backtest Configuration: Cross-Sectional Factor Strategy
# 
# 多因子截面选币策略回测配置
# 基于: https://www.fmz.com/digest-topic/9647
#
# 运行方式:
#   cd /Users/joe/Sync/worktrees/nautilus_quants-feature-005
#   python -m nautilus_quants.backtest run config/backtest_cross_sectional.yaml
#
# 策略逻辑:
#   - 做多因子值最小的10个币种
#   - 做空因子值最大的10个币种

# 4h bars: 1=4h, 3=12h, 6=1d, 12=2d, 18=3d, 42=7d
periods: [1, 2, 3, 6]
quantiles: 5
max_loss: 0.35
filter_zscore: 20.0

metrics:
  factor_metrics: true

# Registry
registry:
  enabled: true
  env: "test"

# Charts (minimal for batch speed)
charts:
  - quantile_returns_bar
  - ic_time_series
  - monthly_ic_heatmap

output_dir: "logs/alpha_batch/alpha101_p1"
output_format:
  - png

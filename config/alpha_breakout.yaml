# Alpha Factor Analysis Configuration - Breakout Factors
# 突破因子质量评估 (IC/ICIR)
#
# 核心问题：放量突破在加密市场中是否有效？
# - volume_surge_24h: 量放大倍数 → 预期正 IC
# - breakout_score: 放量×突破 → 预期正 IC
# - 对比原始 volume（静态属性）→ 已知负 IC
#
# Usage:
#   python -m nautilus_quants.alpha analyze config/alpha_breakout.yaml


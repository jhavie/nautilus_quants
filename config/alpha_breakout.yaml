# Factors to analyze
# 放入所有单因子 + 组合因子，不含 _norm 中间产物
factors:
  - volume_surge_24h     # 量放大倍数 (核心：预期正IC)
  - volume_surge_6h      # 量放大倍数 (短窗口，更敏感)
  - volume_ts_rank       # 当前量在历史中的百分位
  - price_break_high     # 价格突破高点程度
  - price_break_low      # 价格距离低点程度
  - price_position       # 价格在区间中的位置
  - volatility_ratio     # 波动率收缩/扩张比
  - momentum_3h          # 3h动量 (对比baseline)
  - breakout_score       # 放量×突破组合
  - volume_momentum      # 放量×动量组合
  # - breakout_composite   # 多因子合成突破信号

# alphalens parameters
periods: [1, 4, 8, 24, 48, 72]    # forward returns: 1h, 4h, 8h, 24h
quantiles: 35
max_loss: 0.3
filter_zscore: 20.0

# Charts per factor
charts:
  - quantile_returns_bar
  - cumulative_returns
  - ic_time_series
  - ic_histogram
  - turnover

# Output
output_dir: "logs/alpha_analysis"
output_format:
  - png

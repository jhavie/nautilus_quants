# https://www.fmz.com/digest-topic/9647
#
# 策略因子:
#   - volume: 成交量因子 (做多低成交量)
#   - momentum: 3h动量因子 (df_close - df_close.shift(3))/df_close.shift(3)
#   - volatility: 波动率因子 (df_close/df_open).rolling(24).std()
#   - corr: 量价相关性因子 df_close.rolling(96).corr(df_volume)
#
# 时间周期: 1h K线
# 窗口参数: 24h/96h (与FMZ一致)

metadata:
  name: cross_sectional_factors
  version: "3.0"
  description: "Multi-factor model with WorldQuant BRAIN-style normalization"

# 因子参数 (1h周期)
parameters:
  # 短期窗口 (24小时)
  short_window: 24
  # 长期窗口 (96小时 = 4天)
  long_window: 96
  # 动量回溯期 (3小时)
  momentum_period: 3

# 因子权重 (用于多因子合成) - 策略层读取
weights:
  volume: 0.6
  momentum: 0.4
  volatility: 0.3
  corr: 0.4

# 因子定义 (字典格式 - FactorConfig解析器期望)
factors:
  # ========== 原始因子 ==========

  # 成交量因子: 做多低成交量币种，做空高成交量币种
  # factor_volume = df_volume
  volume:
    expression: "volume"
    description: "Raw volume - lower volume coins tend to outperform"

  # 动量因子: 3小时涨幅，具有回归特性
  # factor_1 = (df_close - df_close.shift(3))/df_close.shift(3)
  momentum:
    expression: "(close - delay(close, 3)) / delay(close, 3)"
    description: "3-hour momentum - mean reversion signal"

  # 波动率因子: 价格波动性
  # factor_7 = (df_close/df_open).rolling(24).std()
  volatility:
    expression: "ts_std(close / open, 24)"
    description: "24-hour volatility - lower volatility coins tend to be more stable"

  # 量价相关性因子: 收盘价与成交量的相关性
  # factor_8 = df_close.rolling(96).corr(df_volume)
  corr:
    expression: "correlation(close, volume, 96)"
    description: "96-hour price-volume correlation"

  # ========== 归一化因子 (WorldQuant BRAIN 规范) ==========
  # 使用 winsorize + normalize 组合:
  #   1. winsorize(x, 2): 将异常值裁剪到 ±2 标准差
  #   2. normalize(x, true, 0): 去均值后除以标准差 (z-score)

  volume_norm:
    expression: "normalize(winsorize(volume, 2), true, 0)"
    description: "Normalized volume (winsorized + z-score)"

  momentum_norm:
    expression: "normalize(winsorize(momentum, 2), true, 0)"
    description: "Normalized momentum (winsorized + z-score)"

  volatility_norm:
    expression: "normalize(winsorize(volatility, 2), true, 0)"
    description: "Normalized volatility (winsorized + z-score)"

  corr_norm:
    expression: "normalize(winsorize(corr, 2), true, 0)"
    description: "Normalized correlation (winsorized + z-score)"

  # ========== 复合因子 ==========
  # 加权复合因子用于截面选币
  # 策略消费此因子进行多空排序

  composite:
    expression: "0.6 * volume_norm + 0.4 * momentum_norm + 0.3 * volatility_norm + 0.4 * corr_norm"
    description: "Weighted composite factor for cross-sectional selection"

# 性能设置
performance:
  enable_timing: true
  warning_threshold_ms: 1.0

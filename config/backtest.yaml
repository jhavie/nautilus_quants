# ============================================================================
# Backtest Configuration - MVP
# ============================================================================

# 回测时间范围
period:
  start_date: "2024-01-01"
  end_date: "2024-12-31"

# 交易成本
costs:
  slippage_pct: 0.001           # 滑点 0.1%
  taker_fee_pct: 0.0004         # Taker手续费 0.04%
  maker_fee_pct: 0.0002         # Maker手续费 0.02%

# 资金费率 (合约特有)
funding:
  enabled: false                # MVP不考虑资金费率

# 基准
benchmark:
  symbol: "BTCUSDT"
  method: "buy_hold"

# 绩效目标 (用于评估)
targets:
  min_sharpe: 1.0
  max_drawdown: 0.25            # 最大回撤 25%
  min_win_rate: 0.40

# 输出
output:
  report_dir: "data/reports"
  save_trades: true
  save_equity_curve: true

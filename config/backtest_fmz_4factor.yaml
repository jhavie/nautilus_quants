    - csv
    - html
  tearsheet:
    enabled: true
    title: "FMZ 4-Factor Strategy Backtest (2022-01 to 2022-09)"
    theme: "nautilus"
    height: 1500
    charts:
      - run_info
      - stats_table
      - equity
      - drawdown
      - monthly_returns
      - distribution
      - rolling_sharpe
      - yearly_returns
  quantstats:

# 125 Symbols (from NAUTILUS_SYMBOLS in fmz_4factor_detailed.py)
# 时间范围: 2022-01-01 ~ 2022-02-01
# 初始资金: 10000 USDT
# 持仓数量: 多空各40个
# 单品种仓位: 300 USDT
# 调仓周期: 8小时
# 手续费: 0.02%
#
# 4 因子合成 (from fmz_4factor_detailed.py):
#   - Volume: 0.6
#   - Momentum_3h: 0.4
#   - Volatility: 0.3
#   - Corr: 0.4

venues:
  - name: "BINANCE"
    oms_type: "HEDGING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "10000 USDT"
    default_leverage: 1
    fee_model:
      fee_model_path: "nautilus_trader.backtest.models:MakerTakerFeeModel"
      config_path: "nautilus_trader.backtest.config:FeeModelConfig"
      config:
        maker_fee: 0.0002
        taker_fee: 0.0002


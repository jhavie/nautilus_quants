# OKX Testnet 30m Alpha101 CS Strategy (80-instrument, TopK 30/30)
#
# Usage:
#   python -m nautilus_quants.live run config/live/okx_testnet_15m.yaml --dry-run
#   python -m nautilus_quants.live run config/live/okx_testnet_15m.yaml
#
# Required environment variables:
#   OKX_API_KEY, OKX_API_SECRET, OKX_API_PASSPHRASE
#   (Use testnet API keys from OKX)

venue:
  name: "OKX"
  instrument_type: "SWAP"
  contract_type: "LINEAR"
  margin_mode: "CROSS"
  is_demo: true

instruments:
  bar_spec: "30m"
  # 48 Tier1 (blue-chip) + 32 Tier2 (mid-cap) = 80 instruments
  # Verified on OKX USDT-SWAP live (2026-04-16). Excludes stock/commodity/stablecoin contracts.
  instrument_ids:
    - "AAVE-USDT-SWAP.OKX"
    - "ADA-USDT-SWAP.OKX"
    - "ALGO-USDT-SWAP.OKX"
    - "APE-USDT-SWAP.OKX"

engine:
  trader_id: "TESTNET-ALPHA101-001"

  cache:
    database:
      type: "redis"
      host: "10.100.0.2"
      port: 30379
      timeout: 60
    encoding: "msgpack"
    buffer_interval_ms: 100
    bulk_read_batch_size: 1000
    use_trader_prefix: true
    use_instance_id: false
    flush_on_start: true
    persist_account_events: true
    bar_capacity: 10000
    tick_capacity: 10000

  logging:
    log_level: "INFO"
    log_level_file: "DEBUG"
    log_directory: "logs/testnet_30m"
    use_pyo3: true

  exec_engine:
    reconciliation: true
    filter_position_reports: false
    generate_missing_orders: true
    open_check_interval_secs: 10.0
    open_check_open_only: false
    open_check_lookback_mins: 15
    open_check_threshold_ms: 5000
    open_check_missing_retries: 5
    position_check_interval_secs: 30.0
    position_check_lookback_mins: 60
    position_check_threshold_ms: 5000
    position_check_retries: 5

  risk_engine:
    bypass: false

  controller:
    controller_path: "nautilus_quants.controllers.equity_guard:EquityGuardController"
    config_path: "nautilus_quants.controllers.equity_guard:EquityGuardControllerConfig"
    config:
      interval: "30m"
      venue_name: "OKX"
      currency: "USDT"
      min_equity_ratio: 0.5
      guarded_strategy_ids: []
      drawdown_rules:
        - name: "monthly"
          drawdown_window: "30d"
          drawdown_ratio: 0.8
          cooldown_period: "12h"
        - name: "daily"
          drawdown_window: "1d"
          drawdown_ratio: 0.9
          cooldown_period: "2h"

  actors:
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/fmz/factors_alpha101.yaml"
        max_history: 0
        publish_signals: true
        flush_timeout_secs: 60

    - actor_path: "nautilus_quants.actors.risk_model:RiskModelActor"
      config_path: "nautilus_quants.actors.risk_model:RiskModelActorConfig"
      config:
        portfolio_config_path: "config/portfolio/portfolio.yaml"
        update_interval_bars: 2  # every 2 bars = 1h @30m

    - actor_path: "nautilus_quants.strategies.cs.decision_engine:DecisionEngineActor"
      config_path: "nautilus_quants.strategies.cs.config:DecisionEngineActorConfig"
      config:
        rebalance_interval: 1
        composite_factor: "alpha101"
        selection_policy: "TopKDropoutSelectionPolicy"
        position_mode: "fixed"
        position_value: 15
        topk_long: 30
        topk_short: 30
        n_drop_long: 5
        n_drop_short: 5

    - actor_path: "nautilus_quants.actors.snapshot_aggregator:SnapshotAggregatorActor"
      config_path: "nautilus_quants.actors.snapshot_aggregator:SnapshotAggregatorActorConfig"
      config:
        venue_name: "OKX"
        currency: "USDT"
        interval_secs: 15
        strategy_ids: ["CSStrategy-000"]
        log_directory: "logs/testnet_30m"

  strategies:
    - strategy_path: "nautilus_quants.strategies.cs.strategy:CSStrategy"
      config_path: "nautilus_quants.strategies.cs.config:CSStrategyConfig"
      config:
        instrument_ids: []  # Auto-injected
        oms_type: "NETTING"
        execution_policy: "PostLimitExecutionPolicy"
        use_hyphens_in_client_order_ids: false  # OKX doesn't allow hyphens in clOrdId

  exec_algorithms:
    - exec_algorithm_path: "nautilus_quants.execution.post_limit.algorithm:PostLimitExecAlgorithm"
      config_path: "nautilus_quants.execution.post_limit.config:PostLimitExecAlgorithmConfig"
      config:
        exec_algorithm_id: "PostLimit"
        offset_ticks: 0
        timeout_secs: 15.0
        max_chase_attempts: 3
        max_post_only_retries: 3
        fallback_to_market: true
        post_only: true
        enable_residual_sweep: true
        residual_sweep_min_notional_fallback: 5.0
        max_sweep_retries: 3
        max_transient_retries: 3
        transient_retry_delay_secs: 3.0
        market_timeout_secs: 1500.0

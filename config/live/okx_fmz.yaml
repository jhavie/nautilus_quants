# OKX FMZ Factor Strategy - Live Trading Configuration
#
# Usage:
#   python -m nautilus_quants.live run config/live/okx_fmz.yaml
#   python -m nautilus_quants.live run config/live/okx_fmz.yaml --dry-run
#
# Required environment variables:
#   OKX_API_KEY, OKX_API_SECRET, OKX_API_PASSPHRASE
#
# OKX Account Prerequisites:
#   - Enable "Hedge Mode" (双向持仓) for the trading account
#   - Set contract mode to USDT-margined perpetual swaps

venue:
  name: "OKX"
  instrument_type: "SWAP"
  contract_type: "LINEAR"
  margin_mode: "CROSS"
  is_demo: false

instruments:
  bar_spec: "1h"
  instrument_ids:
    - "BTC-USDT-SWAP"
    - "ETH-USDT-SWAP"
    - "SOL-USDT-SWAP"
    - "DOGE-USDT-SWAP"
    - "XRP-USDT-SWAP"
    - "ADA-USDT-SWAP"
    - "AVAX-USDT-SWAP"
    - "LINK-USDT-SWAP"
    - "DOT-USDT-SWAP"
    - "MATIC-USDT-SWAP"
    - "UNI-USDT-SWAP"
    - "ATOM-USDT-SWAP"
    - "FIL-USDT-SWAP"
    - "LTC-USDT-SWAP"
    - "NEAR-USDT-SWAP"
    - "ARB-USDT-SWAP"
    - "OP-USDT-SWAP"
    - "APT-USDT-SWAP"
    - "INJ-USDT-SWAP"
    - "AAVE-USDT-SWAP"
    - "MKR-USDT-SWAP"
    - "SNX-USDT-SWAP"
    - "CRV-USDT-SWAP"
    - "SUSHI-USDT-SWAP"
    - "SAND-USDT-SWAP"
    - "MANA-USDT-SWAP"
    - "GRT-USDT-SWAP"
    - "FTM-USDT-SWAP"
    - "ALGO-USDT-SWAP"
    - "EOS-USDT-SWAP"

engine:
  trader_id: "LIVE-FMZ-001"
  logging:
    log_level: "INFO"
    log_level_file: "DEBUG"
    log_directory: "logs/live"
    use_pyo3: true
  risk_engine:
    bypass: false
  exec_engine:
    reconciliation: true

  actors:
    - actor_path: "nautilus_quants.actors.factor_engine:FactorEngineActor"
      config_path: "nautilus_quants.actors.factor_engine:FactorEngineActorConfig"
      config:
        factor_config_path: "config/fmz/factors.yaml"
        max_history: 500
        publish_signals: true

  strategies:
    - strategy_path: "nautilus_quants.strategies.fmz.strategy:FMZFactorStrategy"
      config_path: "nautilus_quants.strategies.fmz.strategy:FMZFactorStrategyConfig"
      config:
        instrument_ids: []  # Auto-injected from instruments.instrument_ids
        n_long: 10
        n_short: 10
        position_value: 300
        rebalance_period: 1
        composite_factor: "composite"

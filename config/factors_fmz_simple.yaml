# FMZ 简化因子配置 - 不使用截面归一化
# 直接使用原始因子值进行排序

metadata:
  name: fmz_factors
  version: "1.1"
  description: "FMZ simple factors without cross-sectional normalization"

factors:
  # 成交量因子
  volume:
    expression: "volume"
    description: "Raw volume factor"

  # 3h 动量因子
  momentum:
    expression: "(close - delay(close, 3)) / delay(close, 3)"
    description: "3-hour momentum"

  # 波动率因子
  volatility:
    expression: "ts_std(close / open, 24)"
    description: "24-hour volatility"

  # 量价相关性
  corr:
    expression: "correlation(close, volume, 96)"
    description: "96-hour price-volume correlation"

  # 直接使用原始因子作为合成因子 (简化版)
  # 由于无法做截面归一化，直接使用动量作为排序依据
  composite:
    expression: "momentum"
    description: "Simple composite using momentum only"

performance:
  enable_timing: true
  warning_threshold_ms: 1.0

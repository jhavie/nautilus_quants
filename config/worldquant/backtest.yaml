# WorldQuant VWAP 4h Strategy Backtest Configuration
#
# Alpha Factor: -(close - vwap_4h) / vwap_4h
#   vwap_4h = ts_sum(quote_volume, 4) / ts_sum(volume, 4)
#   均值回归: 价格高于 VWAP 做空, 低于 VWAP 做多
# Data source: 1h BinanceBar (quote_volume + volume fields)
# Time range: 2023-01-01 ~ 2024-12-31
# Initial capital: 100000 USDT
# Neutralization: MARKET (long/short balanced)
# Rebalance: every 4 hours (matches VWAP window)
#
# WorldQuant BRAIN 7-step pipeline:
#   1. Extract vwap_dev_4h from FactorEngineActor
#   2. Delay = 0 (VWAP itself is lagging, no extra delay needed)
#   3. Decay = 3 (smooth signal transitions, reduce turnover)
#   4. Neutralize: subtract cross-sectional mean → sum(alpha) = 0
#   5. Scale: divide by |sum| → sum(|alpha|) = 1
#   6. Truncate: no per-instrument cap
#   7. Allocate: capital * weight = target position value

venues:
  - name: "BINANCE"
    oms_type: "HEDGING"
    account_type: "MARGIN"
    base_currency: "USDT"
    starting_balances:
      - "100000 USDT"
    default_leverage: 1
    fill_model:
      fill_model_path: "nautilus_quants.backtest.models.signal_close_fill:SignalCloseFillModel"
      config_path: "nautilus_quants.backtest.models.signal_close_fill:SignalCloseFillModelConfig"

metadata:
   name: fmz_factors
   version: "1.0"
   description: "FMZ multi-factor strategy exact replica"

factors:
   # 成交量因子
   volume:
     expression: "volume"
     description: "Raw volume factor"

   # 3h 动量因子
   momentum:
     expression: "(close - delay(close, 3)) / delay(close, 3)"
     description: "3-hour momentum"

   # 波动率因子
   volatility:
     expression: "ts_std(close / open, 24)"
     description: "24-hour volatility"

   # 量价相关性
   corr:
     expression: "correlation(close, volume, 96)"
     description: "96-hour price-volume correlation"

   # 归一化因子
   volume_norm:
     expression: "normalize(winsorize(volume, 2), true, 0)"

   momentum_norm:
     expression: "normalize(winsorize(momentum, 2), true, 0)"

   volatility_norm:
     expression: "normalize(winsorize(volatility, 2), true, 0)"

   corr_norm:
     expression: "normalize(winsorize(corr, 2), true, 0)"

   # 合成因子 (FMZ 原文权重)
   composite:
     expression: "0.6 * volume_norm + 0.4 * momentum_norm + 0.3 * volatility_norm + 0.4 * corr_norm"
     description: "FMZ weighted composite"
# Crypto sector classification — 7-sector taxonomy covering the
# backtest_optimized.yaml universe (108 symbols, 2022 Binance Perp survivors).
#
# Sectors:
#   L1     — Layer-1 blockchains (own consensus, native token)
#   L2     — Rollups / sidechains / scaling solutions
#   DEFI   — Lending / AMM / derivatives / synthetics / payments
#   INFRA  — Oracles / storage / indexing / nodes / identity / privacy
#   GAMEFI — Gaming / NFT platforms / virtual worlds / fan tokens / streaming
#   AI     — Data marketplaces / decentralized compute / ML-adjacent
#   MEME   — Pure meme / community-driven tokens without concrete utility
#
# Unmapped instruments auto-fall into "Other" by portfolio/risk_model/fundamental.py.
# Keep this file synced with `constraints.sector_limits` in portfolio.yaml.


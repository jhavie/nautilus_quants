# Analysis scope (empty = all factors)
factors:
  - volume
  - momentum_3h
  - volatility
  - corr
  - composite

# alphalens parameters
periods: [1, 4, 8, 24, 48, 72]   # forward returns: 1h, 4h, 8h, 24h
quantiles: 5
max_loss: 0.3
filter_zscore: 20.0

# Charts per factor (all alphalens capabilities)
charts:
  # Returns analysis
  - quantile_returns_bar         # Mean returns per quantile (bar chart)
  - quantile_returns_violin      # Return distribution per quantile (violin + box)
  - cumulative_returns           # Cumulative returns by quantile
  - cumulative_returns_long_short # Long-short portfolio cumulative returns
  - quantile_spread              # Top-bottom quantile return spread over time
  # - returns_table                # Alpha/Beta summary table
  # IC analysis
  - ic_time_series               # IC over time with moving average
  - ic_histogram                 # IC distribution histogram
  - ic_qq                        # IC Q-Q plot vs normal distribution
  - monthly_ic_heatmap           # Monthly IC heatmap (year x month)
  # Turnover analysis
  - turnover                     # Top/bottom quantile turnover over time
  # - turnover_table               # Turnover summary table
  - factor_rank_autocorrelation  # Factor rank autocorrelation over time
  # Event study & distribution
  # - event_study                  # Average cumulative return around signals
  # - events_distribution          # Factor signal distribution over time
  # - quantile_statistics_table    # Factor value statistics per quantile

# Output
output_dir: "logs/alpha_analysis"
output_format:
  - png

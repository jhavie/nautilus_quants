# Factor Framework Configuration
# This file defines factors using Alpha101-style expressions

metadata:
  name: "nautilus_quants_factors"
  version: "1.0"
  description: "Factor definitions for quantitative trading"

# Global parameters (can be referenced in expressions)
parameters:
  # Time-series lookback periods
  short_period: 5
  medium_period: 20
  long_period: 60
  
  # Cross-sectional parameters
  adv_period: 20  # Average daily volume period
  
  # Breakout parameters
  breakout_period: 30
  sma_period: 200

# Reusable variable definitions
variables:
  # Basic price derivatives
  returns: "delta(close, 1) / delay(close, 1)"
  log_returns: "log(close / delay(close, 1))"
  
  # Volume metrics
  adv20: "ts_mean(volume, adv_period)"
  volume_ratio: "volume / adv20"
  
  # SMA for trend filter
  sma: "ts_mean(close, sma_period)"

# Factor definitions
factors:
  # ============================================
  # Breakout Factor (Validation Target)
  # ============================================
  
  alpha_breakout:
    # 使用 WorldQuant ts_argmax/ts_argmin 语义实现双向突破检测:
    #
    # 做多条件 (返回 +1):
    #   - ts_argmax(close, 31) == 31: 今天的 close 严格大于过去 30 天
    #   - ts_argmax(volume, 31) == 31: 今天的 volume 严格大于过去 30 天
    #   - close > sma: 收盘价在均线之上
    #
    # 做空条件 (返回 -1):
    #   - ts_argmin(close, 31) == 31: 今天的 close 严格小于过去 30 天
    #   - ts_argmax(volume, 31) == 31: 今天的 volume 严格大于过去 30 天 (放量)
    #   - close < sma: 收盘价在均线之下
    #
    # 表达式逻辑: long_signal * 1 + short_signal * (-1)
    expression: "((ts_argmax(close, breakout_period + 1) == breakout_period + 1) * (ts_argmax(volume, breakout_period + 1) == breakout_period + 1) * (close > sma)) - ((ts_argmin(close, breakout_period + 1) == breakout_period + 1) * (ts_argmax(volume, breakout_period + 1) == breakout_period + 1) * (close < sma))"
    description: "量价突破信号: +1=做多(创新高), -1=做空(创新低), 0=无信号"
    category: "breakout"

# Performance settings
performance:
  # Maximum computation time per bar (milliseconds)
  max_compute_time_ms: 1.0
  # Enable performance logging
  enable_timing: true
  # Warning threshold (milliseconds)
  warning_threshold_ms: 0.5
